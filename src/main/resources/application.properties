# ==================================
# Database Configuration
# ==================================
# Tell Spring Boot to use MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/elearning_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# Database username (change to your MySQL username)
spring.datasource.username=root
# Database password (change to your MySQL password)
spring.datasource.password=Lacoste 2185
# Database driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================================
# JPA (Java Persistence API) Configuration
# ==================================
# Show SQL queries in console (helpful for learning)
spring.jpa.show-sql=true
# Format SQL queries nicely
spring.jpa.properties.hibernate.format_sql=true
# Automatically create/update database tables
# create-drop = delete and recreate tables on every restart
# update = update existing tables without deleting data
# validate = only check if tables match entities
spring.jpa.hibernate.ddl-auto=update
# Use MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================================
# JWT Configuration (we'll use these later)
# ==================================
# Secret key for signing JWT tokens (keep this secret!)
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2026
# Token validity in milliseconds (24 hours)
jwt.expiration=86400000

# ==================================
# Server Configuration
# ==================================
# Port where your backend will run
server.port=8080

# ==================================
# Email Configuration (Gmail)
# ==================================
# Use your Gmail credentials (enable 2-factor authentication and create app password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password  # Not your regular password! Create an App Password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application URL for email links
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:3000  # For React frontend later